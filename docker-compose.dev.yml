# docker-compose.dev.yml — Postgres + PostGIS para DESENVOLVIMENTO.
# ATENÇÃO (D2): não subir sem confirmação do usuário. A VPS roda EasyPanel/Traefik e já usa
# 5432/80/443/3000; por isso o host aqui é 5442 (isolamento lógico dev/prod — D1).
services:
  postgis-dev:
    image: postgis/postgis:16-3.4
    container_name: rota33_postgis_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: rota33
      POSTGRES_PASSWORD: rota33_dev
      POSTGRES_DB: rota33_dev
      TZ: America/Sao_Paulo
    ports:
      - "5442:5432"
    volumes:
      - rota33_pgdata_dev:/var/lib/postgresql/data

volumes:
  rota33_pgdata_dev:
